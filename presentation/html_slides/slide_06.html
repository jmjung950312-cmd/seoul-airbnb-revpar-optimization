.slide {

  position: relative;
  overflow: hidden;
}

/* 다크 슬라이드 */
.slide-dark {
  background: linear-gradient(135deg, #1A1A2E 0%, #16213E 50%, #0F3460 100%);
  color: white;
}

/* 라이트 슬라이드 */
.slide-light {
  background: #FFFFFF;
  color: var(--charcoal);
}

/* 카드 컴포넌트 */
.card {
  background: #F5F5F5;
  border-radius: 6px;
  box-shadow: none;
  padding: 32px;
}
.card-coral {
  background: var(--coral);
  color: white;
}
.card-teal {
  background: var(--teal);
  color: white;
}
.card-dark {
  background: #2B2B3D;
  color: white;
}

/* 태그 */
.tag {
  display: inline-block;
  padding: 6px 16px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: 500;
}
.tag-coral { background: rgba(255,90,95,0.15); color: var(--coral); }
.tag-teal { background: rgba(0,166,153,0.15); color: var(--teal); }

/* 큰 숫자 */
.big-number {
  font-size: 72px;
  font-weight: 900;
  line-height: 1;
  color: var(--coral);
}
.big-number-white {
  font-size: 72px;
  font-weight: 900;
  line-height: 1;
  color: white;
}

/* 페이지 번호 */
.page-num {
  position: absolute;
  bottom: 30px;
  right: 50px;
  font-size: 14px;
  color: var(--gray-400);
}
.page-num-light {
  color: rgba(255,255,255,0.4);
}

.deco-circle {

}

  height: 4px;

  border-radius: 2px;
  margin: 16px 0;
}

/* ── 신규 공통 클래스 ── */

}
.slide-title {
  font-size: 28px;

  margin: 6px 0 8px;
}
.title-underline {
  width: var(--underline-width);
  height: var(--underline-height);
  background: var(--coral);
  border-radius: 2px;
  margin-bottom: 32px;
}
.insight-box {
  background: var(--insight-bg);

.list-item {

.pill {
