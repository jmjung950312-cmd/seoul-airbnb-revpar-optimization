<!DOCTYPE html><html><head><style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1920px; height: 1080px;
  font-family: 'Noto Sans KR', sans-serif;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* 색상 시스템 */
:root {
  --coral: #FF5A5F;
  --coral-light: #FF787C;
  --coral-dark: #E04347;
  --teal: #00A699;
  --teal-light: #00C9B7;
  --charcoal: #484848;
  --dark-bg: #1A1A2E;
  --dark-bg-2: #16213E;
  --light-bg: #F7F7F7;
  --white: #FFFFFF;
  --gray-100: #F5F5F5;
  --gray-200: #E8E8E8;
  --gray-300: #DBDBDB;
  --gray-400: #B0B0B0;
  --gray-500: #767676;
  --gray-600: #484848;
}

.slide {
  width: 1920px; height: 1080px;
  position: relative;
  overflow: hidden;
}

/* 다크 슬라이드 */
.slide-dark {
  background: linear-gradient(135deg, #1A1A2E 0%, #16213E 50%, #0F3460 100%);
  color: white;
}

/* 라이트 슬라이드 */
.slide-light {
  background: #F7F7F7;
  color: var(--charcoal);
}

/* 카드 컴포넌트 */
.card {
  background: white;
  border-radius: 16px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  padding: 32px;
  transition: transform 0.2s;
}
.card-coral {
  background: linear-gradient(135deg, var(--coral) 0%, var(--coral-dark) 100%);
  color: white;
}
.card-teal {
  background: linear-gradient(135deg, var(--teal) 0%, #008C82 100%);
  color: white;
}
.card-dark {
  background: linear-gradient(135deg, #2B2B3D 0%, #1A1A2E 100%);
  color: white;
}

/* 태그 */
.tag {
  display: inline-block;
  padding: 6px 16px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: 500;
}
.tag-coral { background: rgba(255,90,95,0.15); color: var(--coral); }
.tag-teal { background: rgba(0,166,153,0.15); color: var(--teal); }

/* 큰 숫자 */
.big-number {
  font-size: 72px;
  font-weight: 900;
  line-height: 1;
  color: var(--coral);
}
.big-number-white {
  font-size: 72px;
  font-weight: 900;
  line-height: 1;
  color: white;
}

/* 페이지 번호 */
.page-num {
  position: absolute;
  bottom: 30px;
  right: 50px;
  font-size: 14px;
  color: var(--gray-400);
}
.page-num-light {
  color: rgba(255,255,255,0.4);
}

/* 장식 요소 */
.deco-circle {
  position: absolute;
  border-radius: 50%;
  opacity: 0.06;
}
.deco-line {
  width: 60px;
  height: 4px;
  background: var(--coral);
  border-radius: 2px;
  margin: 16px 0;
}

  .wrap { padding: 70px 80px; height: 100%; display: flex; flex-direction: column; }
  .top-label { font-size: 14px; color: var(--coral); font-weight: 700; letter-spacing: 2px; }
  .top-title { font-size: 32px; font-weight: 900; margin: 8px 0 32px; }
  .orch { background: linear-gradient(135deg, var(--coral), var(--coral-dark)); color: white; border-radius: 16px; padding: 24px 40px; text-align: center; margin-bottom: 20px; box-shadow: 0 8px 30px rgba(255,90,95,0.3); }
  .arrow-down { text-align: center; font-size: 28px; color: var(--gray-300); margin: 8px 0; }
  .agents { display: flex; gap: 16px; margin-bottom: 20px; }
  .results { display: flex; gap: 20px; margin-top: auto; }
  .result-card { flex: 1; background: var(--gray-100); border-radius: 12px; padding: 20px; text-align: center; }
  </style></head><body>
  <div class="slide slide-light">
    <div class="wrap">
      <div class="top-label">대시보드 · 자동화</div>
      <div class="top-title">Multi-Agent AI 아키텍처</div>
      <div class="orch">
        <div style="font-size: 14px; opacity: 0.7;">Central</div>
        <div style="font-size: 24px; font-weight: 700;">Orchestrator</div>
        <div style="font-size: 14px; opacity: 0.7; margin-top: 4px;">SOP 기반 순차 호출 · JSON 산출물 관리</div>
      </div>
      <div class="arrow-down">↓</div>
      <div class="agents">
    <div style="flex: 1; background: white; border-radius: 16px; padding: 24px 16px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.06); border-top: 4px solid var(--coral);">
      <div style="font-size: 17px; font-weight: 700; line-height: 1.4;">Domain<br>Research</div>
      <div style="font-size: 13px; color: var(--gray-500); margin-top: 8px;">도메인 지식</div>
    </div>
    <div style="flex: 1; background: white; border-radius: 16px; padding: 24px 16px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.06); border-top: 4px solid #E67E22;">
      <div style="font-size: 17px; font-weight: 700; line-height: 1.4;">Hypothesis</div>
      <div style="font-size: 13px; color: var(--gray-500); margin-top: 8px;">H1~H9 자동 생성</div>
    </div>
    <div style="flex: 1; background: white; border-radius: 16px; padding: 24px 16px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.06); border-top: 4px solid var(--teal);">
      <div style="font-size: 17px; font-weight: 700; line-height: 1.4;">EDA ×3</div>
      <div style="font-size: 13px; color: var(--gray-500); margin-top: 8px;">38개 차트, 통계</div>
    </div>
    <div style="flex: 1; background: white; border-radius: 16px; padding: 24px 16px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.06); border-top: 4px solid #3498DB;">
      <div style="font-size: 17px; font-weight: 700; line-height: 1.4;">Feature<br>Engineering</div>
      <div style="font-size: 13px; color: var(--gray-500); margin-top: 8px;">14개 파생변수</div>
    </div>
    <div style="flex: 1; background: white; border-radius: 16px; padding: 24px 16px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.06); border-top: 4px solid #8E44AD;">
      <div style="font-size: 17px; font-weight: 700; line-height: 1.4;">Modeling</div>
      <div style="font-size: 13px; color: var(--gray-500); margin-top: 8px;">LightGBM + SHAP</div>
    </div>
    <div style="flex: 1; background: white; border-radius: 16px; padding: 24px 16px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.06); border-top: 4px solid #2C3E50;">
      <div style="font-size: 17px; font-weight: 700; line-height: 1.4;">Model<br>Review</div>
      <div style="font-size: 13px; color: var(--gray-500); margin-top: 8px;">누수 검출, 품질</div>
    </div></div>
      <div class="arrow-down">↓</div>
      <div class="results">
        <div class="result-card">
          <div style="font-size: 36px; font-weight: 900; color: var(--coral);">9</div>
          <div style="font-size: 14px; color: var(--gray-500);">가설 검증</div>
        </div>
        <div class="result-card">
          <div style="font-size: 36px; font-weight: 900; color: var(--teal);">14</div>
          <div style="font-size: 14px; color: var(--gray-500);">파생변수</div>
        </div>
        <div class="result-card">
          <div style="font-size: 36px; font-weight: 900; color: #3498DB;">38</div>
          <div style="font-size: 14px; color: var(--gray-500);">차트</div>
        </div>
        <div class="result-card">
          <div style="font-size: 36px; font-weight: 900; color: #8E44AD;">R² 0.85</div>
          <div style="font-size: 14px; color: var(--gray-500);">모델 성능</div>
        </div>
      </div>
    </div>
    <div class="page-num">31</div>
  </div></body></html>
