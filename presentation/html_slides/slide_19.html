<!DOCTYPE html><html><head><style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1920px; height: 1080px;
  font-family: 'Noto Sans KR', sans-serif;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* 색상 시스템 */
:root {
  --coral: #FF5A5F;
  --coral-light: #FF787C;
  --coral-dark: #E04347;
  --teal: #00A699;
  --teal-light: #00C9B7;
  --charcoal: #484848;
  --dark-bg: #1A1A2E;
  --dark-bg-2: #16213E;
  --light-bg: #F7F7F7;
  --white: #FFFFFF;
  --gray-100: #F5F5F5;
  --gray-200: #E8E8E8;
  --gray-300: #DBDBDB;
  --gray-400: #B0B0B0;
  --gray-500: #767676;
  --gray-600: #484848;
}

.slide {
  width: 1920px; height: 1080px;
  position: relative;
  overflow: hidden;
}

/* 다크 슬라이드 */
.slide-dark {
  background: linear-gradient(135deg, #1A1A2E 0%, #16213E 50%, #0F3460 100%);
  color: white;
}

/* 라이트 슬라이드 */
.slide-light {
  background: #F7F7F7;
  color: var(--charcoal);
}

/* 카드 컴포넌트 */
.card {
  background: white;
  border-radius: 16px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  padding: 32px;
  transition: transform 0.2s;
}
.card-coral {
  background: linear-gradient(135deg, var(--coral) 0%, var(--coral-dark) 100%);
  color: white;
}
.card-teal {
  background: linear-gradient(135deg, var(--teal) 0%, #008C82 100%);
  color: white;
}
.card-dark {
  background: linear-gradient(135deg, #2B2B3D 0%, #1A1A2E 100%);
  color: white;
}

/* 태그 */
.tag {
  display: inline-block;
  padding: 6px 16px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: 500;
}
.tag-coral { background: rgba(255,90,95,0.15); color: var(--coral); }
.tag-teal { background: rgba(0,166,153,0.15); color: var(--teal); }

/* 큰 숫자 */
.big-number {
  font-size: 72px;
  font-weight: 900;
  line-height: 1;
  color: var(--coral);
}
.big-number-white {
  font-size: 72px;
  font-weight: 900;
  line-height: 1;
  color: white;
}

/* 페이지 번호 */
.page-num {
  position: absolute;
  bottom: 30px;
  right: 50px;
  font-size: 14px;
  color: var(--gray-400);
}
.page-num-light {
  color: rgba(255,255,255,0.4);
}

/* 장식 요소 */
.deco-circle {
  position: absolute;
  border-radius: 50%;
  opacity: 0.06;
}
.deco-line {
  width: 60px;
  height: 4px;
  background: var(--coral);
  border-radius: 2px;
  margin: 16px 0;
}

  .wrap { padding: 80px 100px; height: 100%; display: flex; flex-direction: column; }
  .top-label { font-size: 14px; color: var(--coral); font-weight: 700; letter-spacing: 2px; }
  .top-title { font-size: 32px; font-weight: 900; margin: 8px 0 36px; }
  table { width: 100%; border-collapse: separate; border-spacing: 0; margin-bottom: 36px; }
  th { padding: 16px 24px; background: var(--gray-100); font-size: 15px; color: var(--gray-500); font-weight: 600; text-align: center; }
  td { padding: 18px 24px; border-bottom: 1px solid var(--gray-200); font-size: 17px; text-align: center; }
  th:first-child { border-radius: 12px 0 0 0; text-align: left; } th:last-child { border-radius: 0 12px 0 0; }
  tr.highlight td { background: rgba(255,90,95,0.04); font-weight: 700; }
  .insights { display: flex; gap: 24px; }
  .insight { flex: 1; background: white; border-radius: 16px; padding: 24px 28px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
  .insight .num { font-size: 32px; font-weight: 900; margin-bottom: 8px; }
  .insight .label { font-size: 14px; color: var(--gray-500); }
  </style></head><body>
  <div class="slide slide-light">
    <div class="wrap">
      <div class="top-label">모델링 A</div>
      <div class="top-title">호스트 모델 — 성능 비교</div>
      <div class="card" style="padding: 0; overflow: hidden; margin-bottom: 36px;">
        <table>
          <tr><th style="text-align:left;">모델</th><th>CV R²</th><th>Test R²</th><th>Test MAE</th><th>Test MAPE</th></tr>
          <tr class="highlight">
            <td style="text-align:left; color: var(--coral);">LightGBM</td>
            <td><strong>0.847</strong></td><td><strong>0.85</strong></td><td><strong>₩19,554</strong></td><td><strong>32.6%</strong></td>
          </tr>
          <tr><td style="text-align:left;">Random Forest</td><td>0.744</td><td>0.75</td><td>₩24,470</td><td>45.6%</td></tr>
          <tr><td style="text-align:left;">Ridge</td><td>0.579</td><td>0.57</td><td>₩27,595</td><td>70.4%</td></tr>
          <tr><td style="text-align:left; color: var(--gray-400);">Baseline (중위값)</td><td>-0.025</td><td>—</td><td>—</td><td>—</td></tr>
        </table>
      </div>
      <div class="insights">
        <div class="insight">
          <div class="num" style="color: var(--coral);">85%</div>
          <div class="label">호스트 통제 변수만으로<br>RevPAR 설명</div>
        </div>
        <div class="insight">
          <div class="num" style="color: var(--teal);">+0.875</div>
          <div class="label">Baseline 대비 R² 개선<br>→ 모델 존재 가치 증명</div>
        </div>
        <div class="insight">
          <div class="num" style="color: var(--charcoal);">₩19,554</div>
          <div class="label">평균 예측 오차<br>→ 실무 의사결정 활용 수준</div>
        </div>
      </div>
    </div>
    <div class="page-num">19</div>
  </div></body></html>
