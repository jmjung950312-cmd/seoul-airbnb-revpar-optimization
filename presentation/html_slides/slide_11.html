<!DOCTYPE html><html><head><style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1920px; height: 1080px;
  font-family: 'Noto Sans KR', sans-serif;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* 색상 시스템 */
:root {
  --coral: #FF5A5F;
  --coral-light: #FF787C;
  --coral-dark: #E04347;
  --teal: #00A699;
  --teal-light: #00C9B7;
  --charcoal: #484848;
  --dark-bg: #1A1A2E;
  --dark-bg-2: #16213E;
  --light-bg: #F7F7F7;
  --white: #FFFFFF;
  --gray-100: #F5F5F5;
  --gray-200: #E8E8E8;
  --gray-300: #DBDBDB;
  --gray-400: #B0B0B0;
  --gray-500: #767676;
  --gray-600: #484848;
}

.slide {
  width: 1920px; height: 1080px;
  position: relative;
  overflow: hidden;
}

/* 다크 슬라이드 */
.slide-dark {
  background: linear-gradient(135deg, #1A1A2E 0%, #16213E 50%, #0F3460 100%);
  color: white;
}

/* 라이트 슬라이드 */
.slide-light {
  background: #F7F7F7;
  color: var(--charcoal);
}

/* 카드 컴포넌트 */
.card {
  background: white;
  border-radius: 16px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  padding: 32px;
  transition: transform 0.2s;
}
.card-coral {
  background: linear-gradient(135deg, var(--coral) 0%, var(--coral-dark) 100%);
  color: white;
}
.card-teal {
  background: linear-gradient(135deg, var(--teal) 0%, #008C82 100%);
  color: white;
}
.card-dark {
  background: linear-gradient(135deg, #2B2B3D 0%, #1A1A2E 100%);
  color: white;
}

/* 태그 */
.tag {
  display: inline-block;
  padding: 6px 16px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: 500;
}
.tag-coral { background: rgba(255,90,95,0.15); color: var(--coral); }
.tag-teal { background: rgba(0,166,153,0.15); color: var(--teal); }

/* 큰 숫자 */
.big-number {
  font-size: 72px;
  font-weight: 900;
  line-height: 1;
  color: var(--coral);
}
.big-number-white {
  font-size: 72px;
  font-weight: 900;
  line-height: 1;
  color: white;
}

/* 페이지 번호 */
.page-num {
  position: absolute;
  bottom: 30px;
  right: 50px;
  font-size: 14px;
  color: var(--gray-400);
}
.page-num-light {
  color: rgba(255,255,255,0.4);
}

/* 장식 요소 */
.deco-circle {
  position: absolute;
  border-radius: 50%;
  opacity: 0.06;
}
.deco-line {
  width: 60px;
  height: 4px;
  background: var(--coral);
  border-radius: 2px;
  margin: 16px 0;
}

  .sec { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100%; text-align: center; }
  .sec-num { font-size: 120px; font-weight: 900; color: rgba(255,255,255,0.08); position: absolute; top: 50%; left: 50%; transform: translate(-50%, -70%); }
  .sec-label { font-size: 18px; color: var(--coral); font-weight: 600; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 16px; }
  .sec-title { font-size: 48px; font-weight: 900; color: white; }
  .deco-1 { width: 600px; height: 600px; top: -300px; left: -200px; background: var(--coral); }
  .deco-2 { width: 400px; height: 400px; bottom: -200px; right: -100px; background: var(--teal); }
  </style></head><body>
  <div class="slide slide-dark">
    <div class="deco-circle deco-1"></div>
    <div class="deco-circle deco-2"></div>
    <div class="sec-num">03</div>
    <div class="sec">
      <div class="sec-label">SECTION 03</div>
      <div class="sec-title">분석방법 — 탐색적 데이터 분석</div>
      
    </div>
    <div class="page-num page-num-light">11</div>
  </div></body></html>
