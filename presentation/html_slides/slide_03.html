* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1920px; height: 1080px;
  font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* 색상 시스템 */
:root {
  --coral: #FF5A5F;
  --coral-light: #FF787C;
  --coral-dark: #E04347;
  --teal: #00A699;
  --teal-light: #00C9B7;
  --charcoal: #484848;
  --dark-bg: #1A1A2E;
  --dark-bg-2: #16213E;
  --light-bg: #FFFFFF;
  --white: #FFFFFF;
  --insight-bg: #FFF0F3;
  --card-radius: 6px;
  --underline-width: 192px;
  --underline-height: 3px;
  --orange: #FC642D;
  --gray-100: #F5F5F5;
  --gray-200: #E8E8E8;
  --gray-300: #DBDBDB;
  --gray-400: #B0B0B0;
  --gray-500: #767676;
  --gray-600: #484848;
}

.slide {
  width: 1920px; height: 1080px;
  position: relative;
  overflow: hidden;
}

/* 다크 슬라이드 */
.slide-dark {
  background: linear-gradient(135deg, #1A1A2E 0%, #16213E 50%, #0F3460 100%);
  color: white;
}

/* 라이트 슬라이드 */
.slide-light {
  background: #FFFFFF;
  color: var(--charcoal);
}

/* 카드 컴포넌트 */
.card {
  background: #F5F5F5;
  border-radius: 6px;
  box-shadow: none;
  padding: 32px;
}
.card-coral {
  background: var(--coral);
  color: white;
}
.card-teal {
  background: var(--teal);
  color: white;
}
.card-dark {
  background: #2B2B3D;
  color: white;
}

/* 태그 */
.tag {
  display: inline-block;
  padding: 6px 16px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: 500;
}
.tag-coral { background: rgba(255,90,95,0.15); color: var(--coral); }
.tag-teal { background: rgba(0,166,153,0.15); color: var(--teal); }

/* 큰 숫자 */
.big-number {
  font-size: 72px;
  font-weight: 900;
  line-height: 1;
  color: var(--coral);
}
.big-number-white {
  font-size: 72px;
  font-weight: 900;
  line-height: 1;
  color: white;
}

/* 페이지 번호 */
.page-num {
  position: absolute;
  bottom: 30px;
  right: 50px;
  font-size: 14px;
  color: var(--gray-400);
}
.page-num-light {
  color: rgba(255,255,255,0.4);
}

/* 장식 요소 — 비활성화 */
.deco-circle {
  display: none;
}
.deco-line {
  width: 60px;
  height: 4px;
  background: var(--coral);
  border-radius: 2px;
  margin: 16px 0;
}

/* ── 신규 공통 클래스 ── */
.breadcrumb {
  font-size: 13px;
  color: var(--gray-500);
  font-weight: 500;
  letter-spacing: 1px;
}
.slide-title {
  font-size: 28px;
  font-weight: 700;
  color: var(--charcoal);
  margin: 6px 0 8px;
}
.title-underline {
  width: var(--underline-width);
  height: var(--underline-height);
  background: var(--coral);
  border-radius: 2px;
  margin-bottom: 32px;
}
.insight-box {
  background: var(--insight-bg);
  border-left: 4px solid var(--coral);
  border-radius: 0 6px 6px 0;
  padding: 20px 24px;
  font-size: 15px;
  line-height: 1.6;
  color: var(--charcoal);
}
.list-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
  font-size: 15px;
}
.pill {
  display: inline-block;
  padding: 4px 14px;
  border-radius: 14px;
  font-size: 12px;
  font-weight: 600;
}
.pill-coral { background: rgba(255,90,95,0.12); color: var(--coral); }
.pill-teal { background: rgba(0,166,153,0.12); color: var(--teal); }
.pill-gray { background: var(--gray-100); color: var(--gray-500); }

/* 테이블 헤더 공통 */
table th {
  background: #484848;
  color: white;
}

  .sec-wrap { display: flex; width: 100%; height: 100%; }
  .sec-left { width: 40%; background: var(--coral); display: flex; flex-direction: column; justify-content: center; padding: 80px 60px; }
  .sec-right { width: 60%; background: #FFFFFF; display: flex; flex-direction: column; justify-content: center; padding: 80px 80px; }
  .sec-label { font-size: 15px; color: rgba(255,255,255,0.7); font-weight: 600; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 20px; }
  .sec-title { font-size: 44px; font-weight: 800; color: white; line-height: 1.3; }
  .sec-subtitle { font-size: 17px; color: rgba(255,255,255,0.75); margin-top: 20px; line-height: 1.5; }
  .sec-right-content { display: flex; flex-direction: column; gap: 16px; }
  .sec-purpose { font-size: 18px; color: var(--gray-500); font-weight: 500; margin-bottom: 12px; line-height: 1.6; }
  .sec-item { display: flex; align-items: center; gap: 14px; padding: 14px 20px; border-left: 3px solid var(--gray-200); background: #FAFAFA; border-radius: 0 6px 6px 0; }
  .sec-item-pill { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .sec-item-text { font-size: 16px; color: var(--charcoal); font-weight: 500; }
